{% extends "base.html" %}
{% load static %}

{% block style %}{% static "css/verification.css" %}{% endblock %}

{% block content %}
<h2>Account Completion for {{ request.user.username }}</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
</form>

<a href="{% url 'logout' %}">Logout</a>
{% endblock %}
